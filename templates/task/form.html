{{define "task_form"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataSync - 任务表单</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.bootstrap5.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
    <style>
        .ts-wrapper.single .ts-control { border-radius: 0.5rem; border-color: #d1d5db; padding: 0.5rem 0.75rem; font-size: 0.875rem; }
        .ts-wrapper.single.focus .ts-control { border-color: #6366f1; box-shadow: 0 0 0 2px rgba(99,102,241,0.2); }
        .ts-dropdown { border-color: #d1d5db; border-radius: 0.5rem; font-size: 0.875rem; z-index: 9999 !important; position: absolute !important; }
        .ts-dropdown .option.active { background-color: #eef2ff; color: #4338ca; }
        .ts-dropdown .option:hover { background-color: #f5f3ff; }
        .ts-wrapper { position: relative; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
<nav class="bg-white shadow">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <a href="/" class="text-xl font-bold text-indigo-600">DataSync</a>
        <div class="flex items-center gap-6">
            <a href="/" class="text-sm text-gray-600 hover:text-indigo-600">仪表盘</a>
            <a href="/datasources" class="text-sm text-gray-600 hover:text-indigo-600">数据源</a>
            <a href="/tasks" class="text-sm text-indigo-600 font-medium">同步任务</a>
            <a href="/logs" class="text-sm text-gray-600 hover:text-indigo-600">执行日志</a>
            <span class="text-gray-400">|</span>
            <span class="text-gray-600 text-sm">{{.username}}</span>
            <a href="/logout" class="text-sm text-red-500 hover:underline">登出</a>
        </div>
    </div>
</nav>

<div class="max-w-3xl mx-auto px-4 py-8">
    <div class="flex items-center mb-6">
        <a href="/tasks" class="text-indigo-600 hover:underline mr-4">&larr; 返回</a>
        <h1 class="text-2xl font-bold text-gray-800">{{if .task}}编辑任务{{else}}新建任务{{end}}</h1>
    </div>

    {{if .error}}
    <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">{{.error}}</div>
    {{end}}

    <div class="bg-white rounded-xl shadow p-6">
        <form method="POST" action="{{if .task}}/tasks/{{.task.ID}}{{else}}/tasks{{end}}" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">任务名称</label>
                <input type="text" name="name" value="{{if .task}}{{.task.Name}}{{end}}" required
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <!-- Source Section -->
            <fieldset class="border border-gray-200 rounded-lg p-4">
                <legend class="text-sm font-semibold text-gray-700 px-2">源端配置</legend>
                <div class="space-y-3">
                    <div class="flex items-center gap-4">
                        <label class="flex items-center gap-1">
                            <input type="radio" name="source_mode" value="existing" id="source_mode_existing" checked>
                            <span class="text-sm">选择已有数据源</span>
                        </label>
                        <label class="flex items-center gap-1">
                            <input type="radio" name="source_mode" value="manual" id="source_mode_manual">
                            <span class="text-sm">手动输入连接信息</span>
                        </label>
                    </div>

                    <div id="source_existing" class="space-y-3">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">数据源</label>
                            <select name="source_ds_id" id="source_ds_id"
                                class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                                <option value="">请选择</option>
                                {{range .datasources}}
                                <option value="{{.ID}}" {{if and $.task $.task.SourceDSID (eq .ID (deref $.task.SourceDSID))}}selected{{end}}>{{.Name}} ({{.DBType}})</option>
                                {{end}}
                            </select>
                        </div>
                    </div>

                    <div id="source_manual" class="space-y-3 hidden">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">数据库类型</label>
                            <select name="source_db_type" class="w-full border border-gray-300 rounded-lg px-3 py-2">
                                <option value="">请选择</option>
                                <option value="mysql">MySQL</option>
                                <option value="postgresql">PostgreSQL</option>
                                <option value="oracle">Oracle</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">主机</label>
                                <input type="text" name="source_host" class="w-full border border-gray-300 rounded-lg px-3 py-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">端口</label>
                                <input type="number" name="source_port" class="w-full border border-gray-300 rounded-lg px-3 py-2">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                                <input type="text" name="source_username" class="w-full border border-gray-300 rounded-lg px-3 py-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                                <input type="password" name="source_password" class="w-full border border-gray-300 rounded-lg px-3 py-2">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">数据库名</label>
                            <input type="text" name="source_database_name" class="w-full border border-gray-300 rounded-lg px-3 py-2">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">源表</label>
                        <select name="source_table" id="source_table"
                            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                            <option value="">请先选择数据源</option>
                            {{if and .task .task.SourceTable}}
                            <option value="{{.task.SourceTable}}" selected>{{.task.SourceTable}}</option>
                            {{end}}
                        </select>
                    </div>
                </div>
            </fieldset>

            <!-- Target Section -->
            <fieldset class="border border-gray-200 rounded-lg p-4">
                <legend class="text-sm font-semibold text-gray-700 px-2">目标端配置</legend>
                <div class="space-y-3">
                    <div class="flex items-center gap-4">
                        <label class="flex items-center gap-1">
                            <input type="radio" name="target_mode" value="existing" id="target_mode_existing" checked>
                            <span class="text-sm">选择已有数据源</span>
                        </label>
                        <label class="flex items-center gap-1">
                            <input type="radio" name="target_mode" value="manual" id="target_mode_manual">
                            <span class="text-sm">手动输入连接信息</span>
                        </label>
                    </div>

                    <div id="target_existing" class="space-y-3">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">数据源</label>
                            <select name="target_ds_id" id="target_ds_id"
                                class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                                <option value="">请选择</option>
                                {{range .datasources}}
                                <option value="{{.ID}}" {{if and $.task $.task.TargetDSID (eq .ID (deref $.task.TargetDSID))}}selected{{end}}>{{.Name}} ({{.DBType}})</option>
                                {{end}}
                            </select>
                        </div>
                    </div>

                    <div id="target_manual" class="space-y-3 hidden">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">数据库类型</label>
                            <select name="target_db_type" class="w-full border border-gray-300 rounded-lg px-3 py-2">
                                <option value="">请选择</option>
                                <option value="mysql">MySQL</option>
                                <option value="postgresql">PostgreSQL</option>
                                <option value="oracle">Oracle</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">主机</label>
                                <input type="text" name="target_host" class="w-full border border-gray-300 rounded-lg px-3 py-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">端口</label>
                                <input type="number" name="target_port" class="w-full border border-gray-300 rounded-lg px-3 py-2">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                                <input type="text" name="target_username" class="w-full border border-gray-300 rounded-lg px-3 py-2">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                                <input type="password" name="target_password" class="w-full border border-gray-300 rounded-lg px-3 py-2">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">数据库名</label>
                            <input type="text" name="target_database_name" class="w-full border border-gray-300 rounded-lg px-3 py-2">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">目标表</label>
                        <select name="target_table" id="target_table"
                            class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                            <option value="">请先选择数据源</option>
                            {{if and .task .task.TargetTable}}
                            <option value="{{.task.TargetTable}}" selected>{{.task.TargetTable}}</option>
                            {{end}}
                        </select>
                    </div>
                </div>
            </fieldset>

            <!-- Sync Settings -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">同步类型</label>
                    <select name="sync_type" required
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="structure" {{if and .task (eq .task.SyncType "structure")}}selected{{end}}>结构同步</option>
                        <option value="data" {{if and .task (eq .task.SyncType "data")}}selected{{end}}>数据同步</option>
                        <option value="both" {{if and .task (eq .task.SyncType "both")}}selected{{end}}>全部同步</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">同步模式</label>
                    <select name="sync_mode" id="sync_mode" required
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="manual" {{if and .task (eq .task.SyncMode "manual")}}selected{{end}}>手动</option>
                        <option value="cron" {{if and .task (eq .task.SyncMode "cron")}}selected{{end}}>定时</option>
                        <option value="realtime" {{if and .task (eq .task.SyncMode "realtime")}}selected{{end}}>实时</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">并发分片数
                        <span class="text-xs text-gray-400 ml-1">（1=串行，2-8=并发，大表提速）</span>
                    </label>
                    <input type="number" name="concurrency" min="1" max="8"
                        value="{{if and .task .task.Concurrency}}{{.task.Concurrency}}{{else}}1{{end}}"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div class="flex items-center pt-6">
                    <label class="flex items-center gap-2 text-sm font-medium text-gray-700">
                        <input type="checkbox" name="enable_quality_check" value="true"
                            {{if not .task}}checked{{else if .task.EnableQualityCheck}}checked{{end}}
                            class="h-4 w-4">
                        同步后自动数据校验
                    </label>
                </div>
            </div>

            <div id="cron_section" class="{{if not (and .task (eq .task.SyncMode "cron"))}}hidden{{end}}">
                <label class="block text-sm font-medium text-gray-700 mb-1">Cron 表达式</label>
                <input type="text" name="cron_expr" value="{{if .task}}{{.task.CronExpr}}{{end}}" placeholder="例如: 0 */5 * * *"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <!-- Advanced Filter Section -->
            <div class="border border-gray-200 rounded-lg p-4 space-y-4">
                <button type="button" id="toggle-advanced"
                    class="flex items-center justify-between w-full text-sm font-semibold text-gray-700">
                    <span>高级过滤（可选）</span>
                    <span id="toggle-icon" class="text-gray-400 transition-transform">▶</span>
                </button>

                <div id="advanced-filter-body" class="hidden space-y-4">
                    <!-- Watermark -->
                    <div class="space-y-3">
                        <label class="flex items-center gap-2 text-sm font-medium text-gray-700">
                            <input type="checkbox" id="enable-watermark" class="h-4 w-4"
                                {{if and .task .task.WatermarkColumn}}checked{{end}}>
                            启用增量同步（水位线）
                        </label>

                        <div id="watermark-fields" class="{{if not (and .task .task.WatermarkColumn)}}hidden{{end}} grid grid-cols-2 gap-3 pl-6">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">水位线字段名</label>
                                <input type="text" name="watermark_column"
                                    value="{{if .task}}{{.task.WatermarkColumn}}{{end}}"
                                    placeholder="如: updated_at 或 id"
                                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">水位线类型</label>
                                <select name="watermark_type"
                                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                                    <option value="">请选择</option>
                                    <option value="timestamp" {{if and .task (eq .task.WatermarkType "timestamp")}}selected{{end}}>时间戳字段</option>
                                    <option value="id" {{if and .task (eq .task.WatermarkType "id")}}selected{{end}}>自增 ID 字段</option>
                                </select>
                            </div>
                            {{if and .task .task.LastWatermarkValue}}
                            <div class="col-span-2">
                                <label class="block text-sm font-medium text-gray-500 mb-1">当前水位值（只读）</label>
                                <div class="flex items-center gap-3">
                                    <span class="text-sm text-gray-700 font-mono bg-gray-50 border border-gray-200 rounded px-3 py-1.5">{{.task.LastWatermarkValue}}</span>
                                    <label class="flex items-center gap-1 text-xs text-red-600 cursor-pointer">
                                        <input type="checkbox" name="reset_watermark" value="1" class="h-3 w-3">
                                        重置水位（下次全量同步）
                                    </label>
                                </div>
                            </div>
                            {{end}}
                        </div>
                    </div>

                    <!-- Filter Condition -->
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">
                            自定义过滤条件（WHERE 子句）
                        </label>
                        <textarea name="filter_condition" rows="2"
                            placeholder="直接写条件表达式，不需要 WHERE 关键字，例如：status = 'active' AND region = 'CN'"
                            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm font-mono focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">{{if .task}}{{.task.FilterCondition}}{{end}}</textarea>
                        <p class="text-xs text-gray-400 mt-1">此条件在每次同步时追加到查询，与水位线条件用 AND 合并</p>
                    </div>
                </div>
            </div>

            <div class="pt-4">
                <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition">保存</button>
            </div>
        </form>
    </div>
</div>

<script>
// Toggle source mode
document.querySelectorAll('input[name="source_mode"]').forEach(function(radio) {
    radio.addEventListener('change', function() {
        document.getElementById('source_existing').classList.toggle('hidden', this.value !== 'existing');
        document.getElementById('source_manual').classList.toggle('hidden', this.value !== 'manual');
    });
});

// Toggle target mode
document.querySelectorAll('input[name="target_mode"]').forEach(function(radio) {
    radio.addEventListener('change', function() {
        document.getElementById('target_existing').classList.toggle('hidden', this.value !== 'existing');
        document.getElementById('target_manual').classList.toggle('hidden', this.value !== 'manual');
    });
});

// Toggle cron section
document.getElementById('sync_mode').addEventListener('change', function() {
    document.getElementById('cron_section').classList.toggle('hidden', this.value !== 'cron');
});

// Initialize Tom Select on datasource dropdowns
var tsSrcDS = new TomSelect('#source_ds_id', {
    placeholder: '请选择数据源',
    allowEmptyOption: true,
    onChange: function(value) { loadTables(value, tsSrcTable); }
});
var tsTgtDS = new TomSelect('#target_ds_id', {
    placeholder: '请选择数据源',
    allowEmptyOption: true,
    onChange: function(value) { loadTables(value, tsTgtTable); }
});

// Initialize Tom Select on table dropdowns
var tsSrcTable = new TomSelect('#source_table', {
    placeholder: '请先选择数据源',
    allowEmptyOption: true,
    create: false
});
var tsTgtTable = new TomSelect('#target_table', {
    placeholder: '请先选择数据源',
    allowEmptyOption: true,
    create: false
});

// Load tables when datasource is selected
function loadTables(dsId, tsInstance) {
    if (!dsId) return;
    var currentVal = tsInstance.getValue();
    fetch('/api/datasources/' + dsId + '/tables')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            tsInstance.clearOptions();
            tsInstance.addOption({value: '', text: '请选择表'});
            if (data.tables) {
                data.tables.forEach(function(t) {
                    tsInstance.addOption({value: t, text: t});
                });
            }
            tsInstance.refreshOptions(false);
            if (currentVal && data.tables && data.tables.indexOf(currentVal) >= 0) {
                tsInstance.setValue(currentVal, true);
            }
        })
        .catch(function() {
            tsInstance.clearOptions();
            tsInstance.addOption({value: '', text: '加载失败'});
            tsInstance.refreshOptions(false);
        });
}

// Auto-load tables on page load if datasource is pre-selected (edit mode)
(function() {
    var srcVal = tsSrcDS.getValue();
    var tgtVal = tsTgtDS.getValue();
    if (srcVal) loadTables(srcVal, tsSrcTable);
    if (tgtVal) loadTables(tgtVal, tsTgtTable);
})();

// Toggle advanced filter panel
var toggleBtn = document.getElementById('toggle-advanced');
var filterBody = document.getElementById('advanced-filter-body');
var toggleIcon = document.getElementById('toggle-icon');

// Auto-expand if task has filter values
{{if .task}}
{{if .task.FilterCondition}}
filterBody.classList.remove('hidden');
toggleIcon.style.transform = 'rotate(90deg)';
{{else if .task.WatermarkColumn}}
filterBody.classList.remove('hidden');
toggleIcon.style.transform = 'rotate(90deg)';
{{end}}
{{end}}

if (toggleBtn) {
    toggleBtn.addEventListener('click', function() {
        var hidden = filterBody.classList.contains('hidden');
        filterBody.classList.toggle('hidden', !hidden);
        toggleIcon.style.transform = hidden ? 'rotate(90deg)' : '';
    });
}

// Toggle watermark fields
var enableWm = document.getElementById('enable-watermark');
var wmFields = document.getElementById('watermark-fields');
if (enableWm) {
    enableWm.addEventListener('change', function() {
        wmFields.classList.toggle('hidden', !this.checked);
        if (!this.checked) {
            var wmCol = document.querySelector('input[name="watermark_column"]');
            var wmType = document.querySelector('select[name="watermark_type"]');
            if (wmCol) wmCol.value = '';
            if (wmType) wmType.value = '';
        }
    });
}
</script>
</body>
</html>
{{end}}
