{{define "datasource_form"}}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataSync - 数据源表单</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
<nav class="bg-white shadow">
    <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
        <a href="/" class="text-xl font-bold text-indigo-600">DataSync</a>
        <div class="flex items-center gap-6">
            <a href="/" class="text-sm text-gray-600 hover:text-indigo-600">仪表盘</a>
            <a href="/datasources" class="text-sm text-indigo-600 font-medium">数据源</a>
            <a href="/tasks" class="text-sm text-gray-600 hover:text-indigo-600">同步任务</a>
            <a href="/logs" class="text-sm text-gray-600 hover:text-indigo-600">执行日志</a>
            <span class="text-gray-400">|</span>
            <span class="text-gray-600 text-sm">{{.username}}</span>
            <a href="/logout" class="text-sm text-red-500 hover:underline">登出</a>
        </div>
    </div>
</nav>

<div class="max-w-2xl mx-auto px-4 py-8">
    <div class="flex items-center mb-6">
        <a href="/datasources" class="text-indigo-600 hover:underline mr-4">← 返回</a>
        <h1 class="text-2xl font-bold text-gray-800">{{if .datasource}}编辑数据源{{else}}新增数据源{{end}}</h1>
    </div>

    {{if .error}}
    <div class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm">{{.error}}</div>
    {{end}}

    <div class="bg-white rounded-xl shadow p-6">
        <form id="ds-form" method="POST" action="{{if .datasource}}/datasources/{{.datasource.ID}}{{else}}/datasources{{end}}" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">名称</label>
                <input type="text" name="name" value="{{if .datasource}}{{.datasource.Name}}{{end}}" required
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">数据库类型</label>
                <select name="db_type" id="db_type" required
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    <option value="">请选择</option>
                    <option value="mysql" {{if and .datasource (eq .datasource.DBType "mysql")}}selected{{end}}>MySQL</option>
                    <option value="postgresql" {{if and .datasource (eq .datasource.DBType "postgresql")}}selected{{end}}>PostgreSQL</option>
                    <option value="oracle" {{if and .datasource (eq .datasource.DBType "oracle")}}selected{{end}}>Oracle</option>
                    <option value="clickhouse" {{if and .datasource (eq .datasource.DBType "clickhouse")}}selected{{end}}>ClickHouse</option>
                    <option value="doris" {{if and .datasource (eq .datasource.DBType "doris")}}selected{{end}}>Doris (Apache)</option>
                    <option value="mongodb" {{if and .datasource (eq .datasource.DBType "mongodb")}}selected{{end}}>MongoDB</option>
                    <option value="csv" {{if and .datasource (eq .datasource.DBType "csv")}}selected{{end}}>CSV 文件</option>
                    <option value="excel" {{if and .datasource (eq .datasource.DBType "excel")}}selected{{end}}>Excel 文件</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4 field-std">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">主机</label>
                    <input type="text" name="host" value="{{if .datasource}}{{.datasource.Host}}{{end}}"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">端口</label>
                    <input type="number" name="port" value="{{if .datasource}}{{.datasource.Port}}{{end}}"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 field-std">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                    <input type="text" name="username" value="{{if .datasource}}{{.datasource.Username}}{{end}}"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                    <input type="password" name="password" value="{{if .datasource}}{{.datasource.Password}}{{end}}"
                        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
            </div>

            <div class="field-std">
                <label class="block text-sm font-medium text-gray-700 mb-1" id="db-name-label">数据库名</label>
                <input type="text" name="database_name" value="{{if .datasource}}{{.datasource.DatabaseName}}{{end}}"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <!-- 文件类型专用字段 -->
            <div id="field-file" style="display:none" class="col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1">文件路径
                    <span class="text-xs text-gray-400 ml-1">（填写服务器路径 或 点击上传）</span>
                </label>
                <div class="flex gap-2">
                    <input type="text" name="host" id="file-path-input" placeholder="/data/users.csv"
                        class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-indigo-500">
                    <label class="cursor-pointer bg-indigo-50 border border-indigo-200 text-indigo-700 px-3 py-2 rounded-lg text-sm hover:bg-indigo-100 transition">
                        上传文件
                        <input type="file" id="file-upload-input" accept=".csv,.xlsx,.xls" class="hidden" onchange="uploadFile(this)">
                    </label>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" id="extra-label">额外参数</label>
                <input type="text" name="extra_params" value="{{if .datasource}}{{.datasource.ExtraParams}}{{end}}"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
                    placeholder="可选">
            </div>

            <div class="flex items-center gap-4 pt-4">
                <button type="submit" class="bg-indigo-600 text-white px-6 py-2 rounded-lg hover:bg-indigo-700 transition">保存</button>
                <button type="button" id="test-btn" class="bg-green-600 text-white px-6 py-2 rounded-lg hover:bg-green-700 transition">测试连接</button>
                <span id="test-result" class="text-sm"></span>
            </div>
        </form>
    </div>
</div>

<script>
document.getElementById('test-btn').addEventListener('click', function() {
    var form = document.getElementById('ds-form');
    var formData = new FormData(form);
    var resultEl = document.getElementById('test-result');
    resultEl.innerHTML = '<span class="text-gray-500">测试中...</span>';

    fetch('/api/datasources/test', {
        method: 'POST',
        body: formData
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.success) {
            resultEl.innerHTML = '<span class="text-green-600">连接成功</span>';
        } else {
            resultEl.innerHTML = '<span class="text-red-600">' + (data.error || data.message) + '</span>';
        }
    })
    .catch(function(err) {
        resultEl.innerHTML = '<span class="text-red-600">请求失败</span>';
    });
});

function updateDSFields() {
    var t = document.getElementById('db_type') ? document.getElementById('db_type').value : '';
    var isFile = (t === 'csv' || t === 'excel');
    var isMongo = (t === 'mongodb');
    // 标准字段（host/port/user/pass/db）
    var stdFields = document.querySelectorAll('.field-std');
    stdFields.forEach(function(el) { el.style.display = isFile ? 'none' : ''; });
    // 文件字段
    var fileField = document.getElementById('field-file');
    if (fileField) fileField.style.display = isFile ? '' : 'none';
    // MongoDB extra 字段提示改为 Auth DB
    var isOracle = (t === 'oracle');
    var extraLabel = document.getElementById('extra-label');
    var extraInput = document.querySelector('input[name="extra_params"]');
    if (extraLabel) {
        if (isMongo) extraLabel.textContent = 'Auth Database';
        else if (isOracle) extraLabel.textContent = '额外参数（服务名/SID）';
        else extraLabel.textContent = '额外参数';
    }
    if (extraInput) {
        if (isOracle) {
            extraInput.placeholder = '服务名模式留空；SID 模式填 SID=ORCL';
        } else if (isMongo) {
            extraInput.placeholder = 'admin';
        } else {
            extraInput.placeholder = '可选';
        }
    }
    // Oracle: 数据库名标签改为"服务名"
    var dbNameLabel = document.getElementById('db-name-label');
    if (dbNameLabel) dbNameLabel.textContent = isOracle ? '服务名 (Service Name)' : '数据库名';
}

function uploadFile(input) {
    if (!input.files || !input.files[0]) return;
    var fd = new FormData();
    fd.append('file', input.files[0]);
    fetch('/api/upload', { method: 'POST', body: fd })
        .then(function(r) { return r.json(); })
        .then(function(d) {
            if (d.path) {
                var pathInput = document.getElementById('file-path-input');
                if (pathInput) pathInput.value = d.path;
            }
        })
        .catch(function(e) { alert('上传失败: ' + e.message); });
}

// 页面加载时初始化
var dbTypeSelect = document.getElementById('db_type');
if (dbTypeSelect) {
    dbTypeSelect.addEventListener('change', updateDSFields);
    updateDSFields();
}
</script>
</body>
</html>
{{end}}
